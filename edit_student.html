<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<h1>Edit Student</h1>

<form method="POST">

<input type="text" name="name" value="{{ student[1] }}">

<br><br>

<input type="text" name="roll" value="{{ student[2] }}">

<br><br>

<input type="text" name="course" value="{{ student[3] }}">

<br><br>

<button type="submit">Update Student</button>

</form>

<br><br>

<a href="/view_students">Back</a>

</body>
</html>
