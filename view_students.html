<!DOCTYPE html>
<html>
<head>
    <title>View Students</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<h1>Student List TESTING 123</h1>

<table class="table table-bordered text-center">

<tr class="table-dark">
    <th>ID</th>
    <th>Name</th>
    <th>Roll</th>
    <th>Course</th>
    <th>Action</th>
</tr>

{% for student in students %}

<tr>
    <td>{{ student[0] }}</td>
    <td>{{ student[1] }}</td>
    <td>{{ student[2] }}</td>
    <td>{{ student[3] }}</td>

    <td>
        <a href="/edit/{{ student[0] }}" class="btn btn-sm btn-info">Edit</a>
        <a href="/delete/{{ student[0] }}" class="btn btn-sm btn-danger">Delete</a>
    </td>
</tr>

{% endfor %}

</table>

</body>
</html>
